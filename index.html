<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Future of Research Ecosystem</title>
<meta name="description" content="Rebuilding the research ecosystem for AI scientists — where every research artifact is executable and verifiable.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1530;
  --paper: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--paper);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  letter-spacing: -0.005em;
}
.painterly {
  position: fixed; inset: 0; z-index: -2;
  background:
    radial-gradient(ellipse 60% 50% at 85% 25%, rgba(232,168,120,0.55), transparent 60%),
    radial-gradient(ellipse 70% 60% at 15% 70%, rgba(184,168,212,0.7), transparent 65%),
    linear-gradient(170deg, #c4bdd8 0%, #b0a4cc 30%, #9486b8 60%, #6e5e94 100%);
}
.wrap {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 40px;
  max-width: 1000px;
  margin: 0 auto;
}
.eyebrow {
  font-size: 12px; font-weight: 500; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(255,255,255,0.85);
  margin-bottom: 28px;
}
h1 {
  font-size: clamp(40px, 6vw, 84px);
  font-weight: 600; line-height: 1.04; letter-spacing: -0.04em;
  text-shadow: 0 2px 24px rgba(20, 10, 40, 0.15);
}
h1 .serif {
  font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400;
}
p.lede {
  font-size: clamp(17px, 1.6vw, 21px); line-height: 1.5;
  color: rgba(255,255,255,0.9); max-width: 720px; margin-top: 24px;
}
p.lede em {
  font-family: 'Instrument Serif', serif; font-style: italic; color: var(--paper);
}
.links { display: flex; gap: 14px; margin-top: 48px; flex-wrap: wrap; }
.links a {
  display: inline-flex; align-items: center; padding: 14px 26px;
  border-radius: 999px; font-size: 15px; font-weight: 500;
  color: var(--paper); text-decoration: none;
  border: 1px solid rgba(255,255,255,0.5);
  transition: all 0.25s ease;
}
.links a:hover { background: rgba(255,255,255,0.12); border-color: var(--paper); transform: translateY(-1px); }
</style>
</head>
<body>
<div class="painterly"></div>
<main class="wrap">
  <span class="eyebrow">The Future of Research Ecosystem</span>
  <h1>Rebuilding the research ecosystem<br>for <span class="serif">AI scientists.</span></h1>
  <p class="lede">Research is now produced and consumed by AI, but the ecosystem is still built for humans. We are writing the new substrate — where every research artifact is <em>executable</em> and <em>verifiable</em>.</p>
  <div class="links">
    <a href="https://github.com/the-future-of-research-ecosystem">GitHub</a>
  </div>
</main>
</body>
</html>
